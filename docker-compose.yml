services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: finassist
      POSTGRES_PASSWORD: finassist
      POSTGRES_DB: finassist
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finassist -d finassist"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://finassist:finassist@db:5432/finassist
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
